# Production Configuration

# Server Configuration
server.port=${SERVER_PORT:3000}
server.servlet.context-path=/

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:personal_finance}?useSSL=${USE_SSL:true}&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:amit}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# Disable H2 Console
spring.h2.console.enabled=false

# JWT Configuration
app.jwtSecret=${JWT_SECRET:your-secure-jwt-secret-key-here}
app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Frontend URL for password reset (used by EmailService)
# Set this in your environment or override here. Example: https://app.example.com/reset-password
app.frontend.reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL:https://app.example.com/reset-password}
# Mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Aman55555#
spring.mail.password=inypedmavdmndsho
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=amitrai8736869660@gmail.com

# IMPORTANT: leave test-recipient empty for real user delivery
app.mail.test-recipient=
# Optional: helpful debug lines during development only
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG

# Logging Configuration
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Security Configuration
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m


# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.serialization.fail-on-empty-beans=false

# Validation Configuration
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Actuator Configuration (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
